apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: 5g-solution-wf
  namespace: argo
spec:
  serviceAccountName: argo-workflow
  entrypoint: 5g-solution
  templates:

    # ── DAG ────────────────────────────────────────────────────────────────
    - name: 5g-solution
      dag:
        tasks:
          - name: task1-free5gc
            template: free5gc

          - name: wait-for-services
            template: wait-for-services
            dependencies:
              - task1-free5gc

          - name: task2-sub-prov
            template: sub-prov
            dependencies:
              - task1-free5gc
              - wait-for-services

          - name: delay-10s
            template: delay-10
            dependencies:
              - task2-sub-prov

          - name: task3-ueransim
            template: ueransim
            dependencies:
              - task2-sub-prov
              - delay-10s

    # ── Step 1: Deploy 5G Core ─────────────────────────────────────────────
    - name: free5gc
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: free5gc-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/free5gc-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    # ── Readiness gate: wait for webui + UDR before provisioning ────────────
    - name: wait-for-services
      container:
        image: curlimages/curl:8.5.0
        command: ["/bin/sh", "-c"]
        args:
          - |
            WEBUI="webui-service.free5gc.svc.cluster.local:5000"
            UDR="aws-5gcloudlabs-free5gc-udr-service.free5gc.svc.cluster.local:80"
            MAX_ATTEMPTS=30
            INTERVAL=10

            attempt=1
            while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
              webui_ok=0; udr_ok=0

              if curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://${WEBUI}" | grep -q '^[2345]'; then
                webui_ok=1
              fi
              if curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://${UDR}" | grep -q '^[2345]'; then
                udr_ok=1
              fi

              echo "[attempt ${attempt}/${MAX_ATTEMPTS}] webui=${webui_ok} udr=${udr_ok}"

              if [ "$webui_ok" -eq 1 ] && [ "$udr_ok" -eq 1 ]; then
                echo "Both services are reachable. Proceeding."
                exit 0
              fi

              sleep $INTERVAL
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for services after $((MAX_ATTEMPTS * INTERVAL))s"
            exit 1

    # ── Step 2: Provision Subscribers ──────────────────────────────────────
    - name: sub-prov
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: sub-prov-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/sub-prov-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    # ── Delay: 10s buffer after sub-prov Job completes ────────────────────
    - name: delay-10
      suspend:
        duration: "10s"

    # ── Step 3: Deploy UE & RAN Simulation ────────────────────────────────
    - name: ueransim
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ueransim-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/ueransim-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
