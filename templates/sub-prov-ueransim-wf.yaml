apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: sub-prov-ueransim-wf
  namespace: argo
spec:
  serviceAccountName: argo-workflow
  entrypoint: sub-prov-ueransim
  templates:

    # ── DAG ────────────────────────────────────────────────────────────────
    - name: sub-prov-ueransim
      dag:
        tasks:
          - name: task1-sub-prov
            template: sub-prov

          - name: delay-10s
            template: delay-10
            dependencies:
              - task1-sub-prov

          - name: task2-ueransim
            template: ueransim
            dependencies:
              - task1-sub-prov
              - delay-10s

    # ── Step 1: Provision Subscribers ──────────────────────────────────────
    - name: sub-prov
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: sub-prov-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/sub-prov-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    # ── Delay: 10s buffer after sub-prov Job completes ────────────────────
    - name: delay-10
      suspend:
        duration: "10s"

    # ── Step 2: Deploy UE & RAN Simulation ────────────────────────────────
    - name: ueransim
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ueransim-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/ueransim-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
